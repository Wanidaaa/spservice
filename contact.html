    <style>
        :root { --gold: #D4AF37; --navy: #001f3f; }

        /* ☁️ พื้นหลังเมฆสว่างแบบเดียวกับ index */
        body { 
            background-image: url('https://images.unsplash.com/photo-1501747315-124a0eaca060?q=80&w=1920'); 
            background-size: cover; 
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
        }

        /* ✨ Liquid Glass Overlay */
        .bg-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -1; background: rgba(255, 255, 255, 0.3); 
            backdrop-filter: blur(15px); 
        }

       /* ✨ ปรับเฉพาะแถบ Navigation ให้ Shine & Liquid Glass */
        .header-custom { 
            background: rgba(0, 31, 63, 0.7) !important; /* สีน้ำเงิน Navy แบบโปร่งแสง */
            backdrop-filter: blur(15px) saturate(150%); /* เอฟเฟกต์กระจกเบลอและเร่งสีให้สดใส */
            border-bottom: 2px solid var(--gold); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3); /* เพิ่มเงาให้แถบลอยเด่นออกมา */
            padding: 10px 0; 
            position: sticky;
            top: 0;
            z-index: 1050;
        }

        /* 🏆 ทำให้โลโก้ Shine (ส่องประกาย) */
        .logo-img { 
            height: 70px; 
            width: auto; 
            cursor: pointer; 
            /* ใส่แสงเรืองสีขาวและทองซ้อนกันเพื่อให้ดู Shine ที่สุด */
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.9)) 
                    drop-shadow(0 0 5px rgba(212, 175, 55, 0.5)); 
            transition: 0.4s;
        }

        .logo-img:hover { 
            transform: scale(1.08); 
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 1)); /* สว่างขึ้นตอนเมาส์ชี้ */
        }
        /* 📋 Contact Card แบบ Liquid Glass */
        .contact-card { 
            background: rgba(255, 255, 255, 0.6) !important; 
            backdrop-filter: blur(20px); 
            border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            margin-top: 50px; 
            padding: 50px; 
        }

        .contact-icon { font-size: 3.5rem; color: var(--navy); text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); margin-bottom: 20px; }
        
        .social-link { 
            text-decoration: none; 
            color: var(--navy); 
            font-size: 1.2rem; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 12px;
        }
        .social-link:hover { 
            background: rgba(255, 255, 255, 0.4);
            color: var(--gold); 
            transform: translateX(10px);
        }

        .btn-outline-warning {
            border: 2px solid var(--gold) !important;
            background: rgba(212, 175, 55, 0.1);
            backdrop-filter: blur(5px);
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-outline-warning:hover {
            background: var(--gold) !important;
            color: var(--navy) !important;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
        }
    </style>
