    <style>
        :root { --gold: #D4AF37; --navy: #001f3f; }
        body { background-color: #1a1a1a; font-family: 'Segoe UI', sans-serif; color: white; transition: background-image 1s ease-in-out; background-size: cover; background-attachment: fixed; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: rgba(0,0,0,0.75); }
        
        /* Header & Navigation */
        .header-custom { background: var(--navy); border-bottom: 3px solid var(--gold); padding: 15px 0; z-index: 1050; }
        .btn-contact-outline { color: #ff4d4d; border: 2px solid #ff4d4d; border-radius: 12px; padding: 5px 22px; text-decoration: none; font-weight: bold; transition: 0.3s; background: transparent; font-size: 1.1rem; }
        .btn-contact-outline:hover { background: #ff4d4d; color: white; box-shadow: 0 0 15px rgba(255, 77, 77, 0.4); }

        /* Sidebar เมนูข้าง */
        .sidebar-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); position: sticky; top: 100px; }
        .sidebar-link { color: white; text-decoration: none; display: block; padding: 8px 15px; transition: 0.3s; border-radius: 8px; font-size: 0.95rem; }
        .sidebar-link:hover { background: rgba(255,255,255,0.2); color: var(--gold); padding-left: 20px; }
        .sidebar-title { color: var(--gold); font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 10px; }

        /* Product Cards */
        .section-title { border-left: 6px solid var(--gold); padding-left: 15px; margin: 45px 0 25px 0; font-weight: bold; }
        .product-card { transition: 0.4s; border: none; border-radius: 15px; overflow: hidden; background: white; color: black; height: 100%; cursor: pointer; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .card-img-top { height: 160px; object-fit: cover; }
        .card-body { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 0.95rem; font-weight: bold; height: 2.4em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 5px; }
        .card-price { color: #d9534f; font-size: 1.1rem; font-weight: 800; }

        /* Popup Detail */
        #detail-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: none; overflow-y: auto; padding: 20px; backdrop-filter: blur(8px); animation: fadeIn 0.3s; }
        .detail-content-card { background: white; color: black; border-radius: 25px; max-width: 900px; margin: 40px auto; overflow: hidden; position: relative; animation: slideUp 0.4s ease-out; }
        .price-tag { font-size: 3rem; color: #d9534f; font-weight: 900; margin: 15px 0; }
        .btn-buy { background: linear-gradient(45deg, #ee4d2d, #ff7337); color: white; padding: 15px; font-size: 1.3rem; border-radius: 12px; font-weight: bold; width: 100%; text-decoration: none; display: block; text-align: center; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

</head>

        function render() {
            productsData.forEach(item => {
                let listId = "";
                if(item.cat === "shopee-it") listId = "list-shopee-it";
                else if(item.cat === "shopee-gen") listId = "list-shopee-gen";
                else if(item.cat === "thai-meat") listId = "list-thai-meat";
                else if(item.cat === "thai-veg") listId = "list-thai-veg";
                else listId = "list-pla";

                document.getElementById(listId).innerHTML += `
                <div class="col-md-4 col-sm-6 mb-2">
                    <div class="card product-card shadow-sm" onclick="openDetail(${item.id})">
                        <img src="${item.i}" class="card-img-top">
                        <div class="card-body">
                            <h6 class="card-title text-dark">${item.n}</h6>
                            <p class="card-price">฿${item.p}</p>
                            <button class="btn btn-outline-dark btn-sm w-100 mt-auto">รายละเอียด</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        function openDetail(id) {
            const item = productsData.find(x => x.id == id);
            document.getElementById('d-img').src = item.i;
            document.getElementById('d-name').innerText = item.n;
            document.getElementById('d-price').innerText = "฿ " + item.p;
            document.getElementById('d-desc').innerText = item.d;
            document.getElementById('d-source').innerText = "แหล่งที่มา: " + item.s;
            document.getElementById('d-source').style.color = (item.id <= 16 ? '#ee4d2d' : (item.id <= 32 ? '#198754' : '#0d6efd'));
            document.getElementById('d-link').href = item.url;
            document.getElementById('detail-overlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() {
            document.getElementById('detail-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Auto Background Change 4s
        const bgs = [
            'https://images.unsplash.com/photo-1518770660439-4636190af475?w=1920',
            'https://images.unsplash.com/photo-1555664424-778a1e5e1b48?w=1920',
            'https://images.unsplash.com/photo-1542223175-7582dd70284c?w=1920'
        ];
        let i = 0;
        setInterval(() => {
            document.body.style.backgroundImage = `url('${bgs[i]}')`;
            i = (i + 1) % bgs.length;
        }, 4000);
        document.body.style.backgroundImage = `url('${bgs[0]}')`;

        window.onload = render;
    </script>
